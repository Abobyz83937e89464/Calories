<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Калории</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --smooth-curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- ФОНОВЫЕ ЭФФЕКТЫ ИЗ 1 КОДА --- */
        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .blob { 
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15; 
            animation: moveFast 2.5s infinite alternate ease-in-out; 
        }

        .blob:nth-child(1) { width: 350px; height: 350px; background: #ffffff; top: 10%; left: -10%; }
        .blob:nth-child(2) { width: 300px; height: 300px; background: #cccccc; bottom: 10%; right: -10%; animation-duration: 2s; }

        @keyframes moveFast {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px, 50px) scale(1.15); }
        }

        /* --- ГЛИТЧ ТЕКСТ --- */
        .glitch-text {
            display: inline-block;
            background: linear-gradient(90deg, #fff 0%, #777 50%, #fff 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            animation: shimmer 3s linear infinite, glitch-skew 4s infinite;
        }

        @keyframes shimmer { to { background-position: 200% center; } }
        @keyframes glitch-skew { 
            0%, 93%, 100% { transform: skew(0deg); } 
            94% { transform: skew(-8deg); filter: brightness(1.2); } 
            96% { transform: skew(8deg); filter: brightness(0.8); } 
        }

        /* --- КОНТЕЙНЕР (Стеклянный эффект) --- */
        .container {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 380px;
            padding: 40px 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            max-height: 90vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar { display: none; }

        h2 { margin-bottom: 25px; font-size: 24px; font-weight: 800; }

        /* --- АНИМАЦИИ ПОЯВЛЕНИЯ --- */
        .seq-item { 
            opacity: 0; 
            transform: translateY(30px); 
        }
        
        .seq-item.show { 
            animation: fadeInUp 0.8s var(--smooth-curve) forwards; 
        }

        @keyframes fadeInUp { 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- КНОПКИ ИЗ 1 КОДА --- */
        .outline-button {
            position: relative;
            display: block;
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 22px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 1;
            -webkit-user-select: none;
            user-select: none;
            margin-bottom: 15px;
        }

        .outline-button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 22px;
            border: 1px solid #ffffff;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: -1;
        }

        @media (hover: hover) {
            .outline-button:hover { background: rgba(255, 255, 255, 0.08); border-color: transparent; }
            .outline-button:hover::before { inset: -8px; opacity: 0; }
        }

        .outline-button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.1s ease;
        }

        /* --- ИНПУТЫ ПОД СТИЛЬ --- */
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 15px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.5);
        }

        /* --- ПРЕВЬЮ ФОТО --- */
        #preview {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* --- ЛОАДЕР --- */
        #loader {
            display: none;
            margin: 20px auto;
        }
        
        .spinner {
            margin: 0 auto;
            width: 35px;
            height: 35px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- РЕЗУЛЬТАТ ОТ ИИ --- */
        #result {
            margin-top: 15px;
            padding: 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            text-align: left;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }

    </style>
</head>
<body>

    <div class="bg">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container">
        <h2 class="seq-item" style="animation-delay: 0.1s;"><span class="glitch-text">AI Калории 🍏</span></h2>

        <label class="outline-button seq-item" style="animation-delay: 0.2s;">
            📸 Сделать фото
            <input type="file" accept="image/*" capture="environment" id="fileInput" hidden>
        </label>

        <img id="preview" class="seq-item">

        <div id="inputs" style="display: none;">
            <input type="text" class="seq-item" id="dish" placeholder="Что это?">
            <input type="number" class="seq-item" id="weight" placeholder="Вес (г)">
            <button class="outline-button seq-item" onclick="send()">Узнать 🚀</button>
        </div>

        <div id="loader"><div class="spinner"></div></div>

        <div id="result" class="seq-item"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const inputs = document.getElementById('inputs');
        const result = document.getElementById('result');
        const loader = document.getElementById('loader');

        let file;

        // Плавно показываем начальные элементы при загрузке
        window.onload = () => {
            setTimeout(() => {
                document.querySelectorAll('.container > .seq-item').forEach(el => el.classList.add('show'));
            }, 100);
        };

        // Логика выбора файла и плавное появление новых блоков
        fileInput.onchange = e => {
            file = e.target.files[0];
            if (file) {
                // Скрываем результат, если он был
                result.style.display = 'none';
                result.classList.remove('show');
                
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                inputs.style.display = 'block';

                // Небольшая задержка, чтобы display: block отработал перед анимацией
                setTimeout(() => {
                    preview.classList.add('show');
                    
                    // Плавно по очереди выводим инпуты и кнопку
                    const inputItems = inputs.querySelectorAll('.seq-item');
                    inputItems.forEach((el, index) => {
                        el.style.animationDelay = `${0.1 * (index + 1)}s`;
                        el.classList.add('show');
                    });
                }, 50);
            }
        };

        // Отправка данных
        async function send() {
            loader.style.display = 'block';
            
            // Прячем результат перед новым запросом
            result.classList.remove('show');
            setTimeout(() => { result.style.display = 'none'; }, 300);

            const fd = new FormData();
            fd.append('photo', file);
            fd.append('dishName', document.getElementById('dish').value);
            fd.append('weight', document.getElementById('weight').value);

            try {
                const res = await fetch('https://calories-1-pitp.onrender.com/api/analyze', {
                    method: 'POST',
                    body: fd
                });

                const data = await res.json();
                loader.style.display = 'none';

                // Показываем ответ с анимацией
                result.innerText = data.result || data.error;
                result.style.display = 'block';
                result.style.animationDelay = '0s'; // Убираем задержку
                
                setTimeout(() => {
                    result.classList.add('show');
                }, 50);

            } catch(e) {
                loader.style.display = 'none';
                
                result.innerText = "Ошибка соединения";
                result.style.display = 'block';
                result.style.animationDelay = '0s';
                
                setTimeout(() => {
                    result.classList.add('show');
                }, 50);
            }
        }
    </script>
</body>
</html>
