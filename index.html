<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканер Калорий</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent: #ff9800;
            --input-bg: #1e1e1e;
            --success: #4CAF50;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h2 { margin-bottom: 10px; font-weight: 600; }
        p { color: #aaa; font-size: 14px; margin-bottom: 30px; }
        
        /* Кнопка запуска камеры */
        .camera-btn-wrapper { width: 100%; max-width: 300px; }
        .camera-btn {
            display: block;
            background-color: var(--accent);
            color: #000;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }
        .camera-btn:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(255, 152, 0, 0.2); }
        input[type="file"] { display: none; }

        /* Превью изображения */
        #imagePreview {
            width: 100%;
            max-width: 300px;
            border-radius: 20px;
            margin-top: 20px;
            display: none;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        /* Контейнер формы с анимацией */
        .form-container {
            display: none;
            width: 100%;
            max-width: 350px;
            background: var(--input-bg);
            padding: 25px;
            border-radius: 25px;
            margin-top: 20px;
            text-align: left;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            /* Анимация появления */
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .form-container.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--accent); font-weight: 500; }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #252525;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }
        
        .submit-btn {
            background: var(--success);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:active { opacity: 0.8; }

        /* Статусы */
        #loader { display: none; margin-top: 30px; font-weight: bold; color: var(--accent); }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 20px;
            text-align: left;
            display: none;
            width: 100%;
            max-width: 350px;
            line-height: 1.5;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

    <h2>Умный счетчик 🍏</h2>
    <p>Анализ рациона по фото за секунды</p>

    <div class="camera-btn-wrapper" id="startWrapper">
        <label class="camera-btn">
            📸 СФОТКАТЬ ЕДУ
            <input type="file" accept="image/*" capture="environment" id="fileInput">
        </label>
    </div>

    <img id="imagePreview" alt="Превью еды">

    <div class="form-container" id="detailsForm">
        <label>Что за блюдо?</label>
        <input type="text" id="dishName" placeholder="Например: Плов с курицей">

        <label>Вес порции (г)?</label>
        <input type="text" id="weight" placeholder="Например: 300">

        <label>Соусы / Масло?</label>
        <input type="text" id="sauces" placeholder="Сметана, майонез...">

        <label>Дополнительно (ложки, размер тарелки)</label>
        <input type="text" id="extraInfo" placeholder="2 столовые ложки, глубокая миска">

        <button class="submit-btn" onclick="sendData()">УЗНАТЬ КАЛОРИИ 🚀</button>
    </div>

    <div id="loader">Нейросеть изучает тарелку... 🔍</div>
    <div id="result"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const detailsForm = document.getElementById('detailsForm');
        const startWrapper = document.getElementById('startWrapper');

        let selectedFile = null;

        // Показ превью и формы после фото
        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    startWrapper.style.display = 'none';
                    
                    // Показываем форму с задержкой для анимации
                    detailsForm.style.display = 'block';
                    setTimeout(() => {
                        detailsForm.classList.add('show');
                    }, 50);
                }
                reader.readAsDataURL(file);
            }
        });

        // Отправка данных на сервер Render
        async function sendData() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('photo', selectedFile);
            formData.append('dishName', document.getElementById('dishName').value);
            formData.append('weight', document.getElementById('weight').value);
            formData.append('sauces', document.getElementById('sauces').value);
            formData.append('extraInfo', document.getElementById('extraInfo').value);

            detailsForm.classList.remove('show');
            setTimeout(() => { detailsForm.style.display = 'none'; }, 500);
            document.getElementById('loader').style.display = 'block';

            try {
                // ВАЖНО: Вставь сюда свою ссылку от Render вместо этой заглушки:
                const RENDER_URL = 'https://calories-98um.onrender.com'; 
                
                const response = await fetch(`${RENDER_URL}/api/analyze`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                document.getElementById('loader').style.display = 'none';
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                
                if (data.success) {
                    // Используем регулярку, чтобы заменить переносы строк на <br> для HTML
                    const formattedResult = data.result.replace(/\n/g, '<br>');
                    resultDiv.innerHTML = `<strong>АНАЛИЗ ГОТОВ:</strong><br><br>${formattedResult}`;
                } else {
                    resultDiv.innerHTML = `<strong>Ошибка:</strong><br>${data.error}`;
                }
            } catch (err) {
                document.getElementById('loader').style.display = 'none';
                alert("Ошибка соединения с сервером. Убедись, что Render запущен.");
            }
        }
    </script>
</body>
</html>
