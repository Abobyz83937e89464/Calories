<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканер Калорий</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #121212; --txt: #fff; --acc: #ff9800; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); padding: 20px; text-align: center; }
        .btn { background: var(--acc); color: #000; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; display: inline-block; width: 100%; border: none; margin-top: 10px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        #loader { display: none; color: var(--acc); margin-top: 20px; }
        #result { display: none; background: #222; padding: 15px; border-radius: 15px; margin-top: 20px; text-align: left; border-left: 4px solid var(--acc); }
        img { max-width: 100%; border-radius: 15px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <h3>Сканер еды 🍏</h3>
    <label class="btn">📸 СФОТКАТЬ ЕДУ
        <input type="file" accept="image/*" capture="environment" id="fileInput" style="display:none">
    </label>
    <img id="preview">
    <div id="form" style="display:none">
        <input type="text" id="dishName" placeholder="Название (опционально)">
        <input type="text" id="weight" placeholder="Примерный вес (г)">
        <button class="btn" onclick="sendData()" style="background:#4CAF50; color:#fff">АНАЛИЗИРОВАТЬ 🚀</button>
    </div>
    <div id="loader">Нейросеть думает... 🔍</div>
    <div id="result"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const form = document.getElementById('form');
        let selectedFile = null;

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                form.style.display = 'block';
            }
        };

        async function sendData() {
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            
            loader.style.display = 'block';
            form.style.display = 'none';
            resultDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('photo', selectedFile);
            formData.append('dishName', document.getElementById('dishName').value);
            formData.append('weight', document.getElementById('weight').value);

            try {
                // ТВОЙ РЕАЛЬНЫЙ СЕРВЕР НА RENDER
                const response = await fetch('https://calories-1-pitp.onrender.com', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                loader.style.display = 'none';
                resultDiv.style.display = 'block';
                
                if (data.success) {
                    resultDiv.innerHTML = `<b>РЕЗУЛЬТАТ:</b><br>${data.result.replace(/\n/g, '<br>')}`;
                } else {
                    resultDiv.innerText = "Ошибка: " + data.error;
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("Нет связи с сервером. Попробуй еще раз через 10 секунд.");
            }
        }
    </script>
</body>
</html>
