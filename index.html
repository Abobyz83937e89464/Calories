<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Debug Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #121212; --txt: #e0e0e0; --acc: #ff9800; --err: #ff5252; --success: #4caf50; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background: var(--bg); color: var(--txt); padding: 15px; margin: 0; text-align: center; }
        
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Кнопки */
        .btn { background: var(--acc); color: #000; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; display: block; width: 100%; border: none; margin: 10px 0; font-size: 16px; text-transform: uppercase; }
        .btn-send { background: var(--success); color: #fff; display: none; }
        
        /* Инпуты */
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #1e1e1e; color: #fff; box-sizing: border-box; font-size: 16px; }
        
        /* Превью и блоки */
        #preview { width: 100%; border-radius: 15px; margin-top: 15px; display: none; border: 2px solid #333; }
        #loader { display: none; color: var(--acc); margin: 20px 0; font-weight: bold; }
        
        #result { 
            display: none; 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 12px; 
            margin-top: 20px; 
            text-align: left; 
            border-left: 5px solid var(--acc);
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .error-box { 
            color: var(--err); 
            background: rgba(255, 82, 82, 0.1); 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 10px; 
            font-size: 14px; 
            display: none;
            border: 1px solid var(--err);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom: 5px;">AI Калории 🍏</h2>
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Версия: Groq Vision Debug</p>

        <label class="btn">
            📸 Сделать фото еды
            <input type="file" accept="image/*" capture="environment" id="fileInput" style="display:none">
        </label>

        <img id="preview" alt="Превью">

        <div id="inputsBlock" style="display:none">
            <input type="text" id="dishName" placeholder="Что на тарелке? (опционально)">
            <input type="number" id="weight" placeholder="Примерный вес в граммах">
            <button class="btn btn-send" id="sendBtn" onclick="sendData()">Узнать калории 🚀</button>
        </div>

        <div id="loader">⏳ Нейросеть анализирует...</div>
        
        <div id="result"></div>
        <div id="errorLog" class="error-box"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const inputsBlock = document.getElementById('inputsBlock');
        const sendBtn = document.getElementById('sendBtn');
        const resultDiv = document.getElementById('result');
        const errorLog = document.getElementById('errorLog');
        const loader = document.getElementById('loader');

        let selectedFile = null;

        // Когда выбрали файл
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                inputsBlock.style.display = 'block';
                sendBtn.style.display = 'block';
                resultDiv.style.display = 'none';
                errorLog.style.display = 'none';
            }
        };

        async function sendData() {
            // Скрываем всё лишнее, показываем лоадер
            loader.style.display = 'block';
            sendBtn.style.display = 'none';
            errorLog.style.display = 'none';
            resultDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('photo', selectedFile);
            formData.append('dishName', document.getElementById('dishName').value);
            formData.append('weight', document.getElementById('weight').value);

            try {
                // ТВОЙ URL НА RENDER
                const serverUrl = 'https://calories-1-pitp.onrender.com/api/analyze';
                
                const response = await fetch(serverUrl, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.success) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `<b>📊 АНАЛИЗ:</b>\n\n${data.result}`;
                } else {
                    showError("СЕРВЕР ОТВЕТИЛ ОШИБКОЙ:\n" + (data.error || "Неизвестная ошибка"));
                    console.error("Debug Info:", data.stack);
                }

            } catch (err) {
                loader.style.display = 'none';
                showError("ОШИБКА СВЯЗИ:\nСервер недоступен или блокирует запрос. Проверь логи на Render.");
                console.error("Fetch error:", err);
            }
        }

        function showError(text) {
            errorLog.innerText = text;
            errorLog.style.display = 'block';
            sendBtn.style.display = 'block'; // Возвращаем кнопку, чтобы можно было переотправить
        }
    </script>
</body>
</html>
