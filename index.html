<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Калории</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #121212;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .btn {
            background: orange;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 0;
            display: block;
        }

        #preview {
            width: 100%;
            margin-top: 10px;
            display: none;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
        }

        #result {
            margin-top: 20px;
            white-space: pre-wrap;
        }

        #error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h2>🍏 AI Калории</h2>

<label class="btn">
    📸 Фото еды
    <input type="file" id="fileInput" accept="image/*" style="display:none">
</label>

<img id="preview">

<input type="text" id="dishName" placeholder="Что на тарелке?">
<input type="number" id="weight" placeholder="Вес (г)">

<button class="btn" onclick="sendData()">Узнать калории</button>

<div id="result"></div>
<div id="error"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let selectedFile = null;

const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');

fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
        selectedFile = file;
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
    }
};

async function sendData() {
    const errorDiv = document.getElementById('error');
    const resultDiv = document.getElementById('result');

    errorDiv.innerText = '';
    resultDiv.innerText = '⏳ Анализ...';

    if (!selectedFile) {
        errorDiv.innerText = 'Выбери фото';
        return;
    }

    const formData = new FormData();
    formData.append('photo', selectedFile, selectedFile.name);
    formData.append('dishName', document.getElementById('dishName').value);
    formData.append('weight', document.getElementById('weight').value);

    try {
        const response = await fetch('https://calories-1-pitp.onrender.com/api/analyze', {
            method: 'POST',
            body: formData,
            headers: {
                "Accept": "application/json"
            },
            mode: 'cors',
            credentials: 'omit'
        });

        if (!response.ok) {
            throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        if (data.success) {
            resultDiv.innerText = data.result;
        } else {
            errorDiv.innerText = data.error || 'Ошибка сервера';
        }

    } catch (err) {
        errorDiv.innerText = 'Ошибка: ' + err.message;
        resultDiv.innerText = '';
        console.error(err);
    }
}
</script>

</body>
</html>
